name: Telco Churn CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4  # ✅ Updated

    - name: Set up Python 3.10
      uses: actions/setup-python@v5  # ✅ Updated
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Imports (Quick Sanity Check)
      run: |
        python -c "import pandas; import numpy; import sklearn; import joblib; print('✅ All imports OK')"

    - name: Check Model File Exists
      run: |
        if [ -f "churn_rf_simple.pkl" ]; then
          echo "✅ Model file found"
        else
          echo "⚠️ Model file not found (optional for CI)"
        fi

    - name: Deployment Ready
      run: |
        echo "🚀 Pipeline complete. Code is ready for deployment."
