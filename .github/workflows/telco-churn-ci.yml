name: Telco Churn CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js warning fix

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest

    - name: Run Tests (Safe Mode)
      run: |
        if [ -d "tests" ] && [ "$(ls -A tests/ 2>/dev/null)" ]; then
          echo "🧪 Tests found! Running pytest..."
          pytest tests/ -v --tb=short
        else
          echo "️ tests/ folder empty/missing. Skipping safely."
        fi

    - name: Deployment Ready
      run: echo "🚀 Pipeline complete. Code is ready."
