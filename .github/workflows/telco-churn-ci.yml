name: Telco Churn CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5  # ✅ Updated to v5 (Node.js 24 native)

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Verify Environment
      run: |
        python -c "import pandas; import sklearn; import joblib; print('✅ Environment OK')"

    - name: Build Success
      run: echo "🚀 Pipeline Successful! App is ready."
